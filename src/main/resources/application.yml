server:
  port: 8001
  application:
    name: chatRAGDemo
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # 增加响应超时时间，避免流式响应被中断
      force-response: true

spring:
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      embedding:
        options:
          model: text-embedding-v1 # 阿里云文本向量化模型
  webflux:
    reactive:
      streaming:
        # 禁用响应聚合，确保流式输出
        enable-aggregation: false
  # 如果使用Tomcat容器，禁用输出缓冲
  tomcat:
    max-swallow-size: -1
    async-timeout: 300000


# Milvus配置
milvus:
  host: 127.0.0.1 # Milvus服务地址（单机版）
  port: 19530      # Milvus默认端口
  database: default
  collection-name: file_embeddings # 向量集合名称
  dimension: 1536 # 阿里云text-embedding-v1模型输出向量维度
